# Storefront-only build (skips Medusa backend + db-migrate).
# Used during the image-proxy rollout to ship just the Next.js layer fast.
# Submit with:
#   SHA=$(git rev-parse --short HEAD)
#   gcloud builds submit --config=cloudbuild-storefront-only.yaml --project=ai-agents-go \
#       --region=us-central1 --substitutions=SHORT_SHA=$SHA --gcs-source-staging-dir=gs://ai-agents-go_cloudbuild/source-leka .

substitutions:
  _REGION: asia-southeast1
  _AR_REPO: asia-southeast1-docker.pkg.dev/ai-agents-go/leka-product-catalogs

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-storefront
    args:
      - 'build'
      - '-t'
      - '$_AR_REPO/medusa-storefront:$SHORT_SHA'
      - '-t'
      - '$_AR_REPO/medusa-storefront:latest'
      - '-f'
      - 'medusa-storefront/Dockerfile'
      - 'medusa-storefront'
      - '--build-arg'
      - 'NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://leka-medusa-backend-538978391890.$_REGION.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_WISDOM_PUBLISHABLE_KEY=pk_b7d7b7412262b05054450cd08213cd3d7d3432616ffff885e4c8a57e1b596e53'
      - '--build-arg'
      - 'NEXT_PUBLIC_VINCI_PUBLISHABLE_KEY=pk_966daecb0de97a83ad5ffab563f3eb1e66bc360dd67b0594c1b86a64287f837a'
      - '--build-arg'
      - 'NEXT_PUBLIC_BERLINER_PUBLISHABLE_KEY=pk_585443cff7953bf55b4581f6bb7af3127a0dc2f723addfc38e31ade49b6451d6'
      - '--build-arg'
      - 'NEXT_PUBLIC_EUROTRAMP_PUBLISHABLE_KEY=pk_e91c2f1cee7a1577fc31298c2c891d52b9e919ff58b8f2eef36bcce6120cf36c'
      - '--build-arg'
      - 'NEXT_PUBLIC_RAMPLINE_PUBLISHABLE_KEY=pk_efdd4924d1fe83bce2386dfdb483d0415a5869e4f08b1ee32fd77236c635aec1'
      - '--build-arg'
      - 'NEXT_PUBLIC_4SOFT_PUBLISHABLE_KEY=pk_01650dad46210b8e881569841f33c7b0e3a536deb417e8109e69774bfc3ae77f'
      - '--build-arg'
      - 'NEXT_PUBLIC_VORTEX_PUBLISHABLE_KEY=pk_df5eb6c3d0032c6baebe18bec7b3be1cdb024ba5efd3833cac2b8517432c56dc'
      - '--build-arg'
      - 'NEXT_PUBLIC_WEPLAY_PUBLISHABLE_KEY=pk_2b18dd5670830702993445fe43f4269a406baab0b20f85cad15d43b9b9a9efbb'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-storefront
    args: ['push', '--all-tags', '$_AR_REPO/medusa-storefront']
    waitFor: ['build-storefront']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-storefront
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy leka-medusa-storefront \
          --image $_AR_REPO/medusa-storefront:$SHORT_SHA \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --port 3000 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 5
        echo "Deployed medusa-storefront:$SHORT_SHA"
    waitFor: ['push-storefront']

images:
  - '$_AR_REPO/medusa-storefront:$SHORT_SHA'
  - '$_AR_REPO/medusa-storefront:latest'

tags:
  - 'leka-storefront-only'
  - '$SHORT_SHA'
