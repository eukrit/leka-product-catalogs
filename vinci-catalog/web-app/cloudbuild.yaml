# Vinci Play Catalog — Cloud Build Pipeline
# Deploys to Cloud Run as a standalone service

substitutions:
  _SERVICE: vinci-catalog
  _REGION: asia-southeast1

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE:latest'
      - '.'
    dir: 'vinci-catalog/web-app'

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/$_SERVICE']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy $_SERVICE \
          --image gcr.io/$PROJECT_ID/$_SERVICE:$SHORT_SHA \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 256Mi \
          --max-instances 3
        echo "Deployed $_SERVICE:$SHORT_SHA to Cloud Run"

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/$_SERVICE:latest'

tags:
  - 'vinci-catalog'
  - '$SHORT_SHA'
