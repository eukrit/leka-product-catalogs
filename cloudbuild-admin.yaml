# cloudbuild-admin.yaml
# Leka Product Catalogs — Admin / Pricing-Config Editor service
#
# Builds the root Dockerfile (Flask) and deploys it as Cloud Run service
# `leka-catalogs-admin` in asia-southeast1.
#
# Auth model (Rule 14):
#   --no-allow-unauthenticated; only the go-access-gateway service account
#   has roles/run.invoker. Public traffic reaches us via
#   https://gateway.goco.bz/leka-product-catalogs/...
#
# Trigger this manually for now:
#   gcloud builds submit --config=cloudbuild-admin.yaml
#
# After first successful deploy, grant the gateway SA invoker (one-time):
#   gcloud run services add-iam-policy-binding leka-catalogs-admin \
#     --region=asia-southeast1 \
#     --member="serviceAccount:go-access-gateway@ai-agents-go.iam.gserviceaccount.com" \
#     --role="roles/run.invoker"
#
# Then in go-access-gateway/registry, point project_id "leka-product-catalogs"
# at this Cloud Run URL.

substitutions:
  _REGION: asia-southeast1
  _AR_REPO: asia-southeast1-docker.pkg.dev/ai-agents-go/leka-product-catalogs
  _SERVICE: leka-catalogs-admin

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-admin
    args:
      - 'build'
      - '-t'
      - '$_AR_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_AR_REPO/$_SERVICE:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-admin
    args: ['push', '--all-tags', '$_AR_REPO/$_SERVICE']
    waitFor: ['build-admin']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-admin
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy $_SERVICE \
          --image $_AR_REPO/$_SERVICE:$SHORT_SHA \
          --region $_REGION \
          --platform managed \
          --no-allow-unauthenticated \
          --service-account claude@ai-agents-go.iam.gserviceaccount.com \
          --port 8080 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 3 \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=ai-agents-go"
        echo "Deployed $_SERVICE:$SHORT_SHA"
    waitFor: ['push-admin']

images:
  - '$_AR_REPO/$_SERVICE:$SHORT_SHA'
  - '$_AR_REPO/$_SERVICE:latest'

tags:
  - 'leka-product-catalogs'
  - 'admin'
  - '$SHORT_SHA'
