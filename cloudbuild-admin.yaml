# cloudbuild-admin.yaml
# Leka Product Catalogs — Flask gateway / pricing-config editor service.
#
# Deploys a new revision of the EXISTING Cloud Run service
# `leka-catalogs-gateway` (image `/gateway`) — that's what the
# go-access-gateway already proxies to under
# https://gateway.goco.bz/leka-product-catalogs/. The v0.5.0 revision
# currently in production predates the /forms/pricing-config and
# /api/pricing-config routes added in v2.20.1, which is why opening the
# editor page returns the gateway's `not_found_in_repo` 404.
#
# Trigger manually:
#   gcloud builds submit --config=cloudbuild-admin.yaml
#
# Auth model: this service is currently --allow-unauthenticated (set up
# before Rule 14). The pricing-config POST handler trusts the
# X-Goog-Authenticated-User-Email / X-Goco-User-Email headers forwarded
# by the access gateway. Tightening to --no-allow-unauthenticated +
# invoker-only-on-claude@ requires a coordinated change in
# go-access-gateway's routing config so it mints a service-to-service
# ID token before proxying — out of scope for this deploy.

substitutions:
  _REGION: asia-southeast1
  _AR_REPO: asia-southeast1-docker.pkg.dev/ai-agents-go/leka-product-catalogs
  _SERVICE: leka-catalogs-gateway
  _IMAGE: gateway

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-gateway
    args:
      - 'build'
      - '-t'
      - '$_AR_REPO/$_IMAGE:$SHORT_SHA'
      - '-t'
      - '$_AR_REPO/$_IMAGE:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-gateway
    args: ['push', '--all-tags', '$_AR_REPO/$_IMAGE']
    waitFor: ['build-gateway']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-gateway
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy $_SERVICE \
          --image $_AR_REPO/$_IMAGE:$SHORT_SHA \
          --region $_REGION \
          --platform managed \
          --service-account claude@ai-agents-go.iam.gserviceaccount.com \
          --port 8080 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 3 \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=ai-agents-go"
        echo "Deployed $_SERVICE:$SHORT_SHA"
    waitFor: ['push-gateway']

images:
  - '$_AR_REPO/$_IMAGE:$SHORT_SHA'
  - '$_AR_REPO/$_IMAGE:latest'

tags:
  - 'leka-product-catalogs'
  - 'gateway'
  - '$SHORT_SHA'
