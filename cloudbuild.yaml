# cloudbuild.yaml
# Leka Product Catalogs — Multi-Service Cloud Build Pipeline
# Services: medusa-backend (Medusa v2), medusa-storefront (Next.js)
#
# Triggers: push to main (deploy) | push to dev/* (build+test only)
# Secrets are loaded from GCP Secret Manager.

substitutions:
  _REGION: asia-southeast1
  _AR_REPO: asia-southeast1-docker.pkg.dev/$PROJECT_ID/leka-product-catalogs

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/medusa-database-url/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/medusa-redis-url/versions/latest
      env: 'REDIS_URL'
    - versionName: projects/$PROJECT_ID/secrets/medusa-cookie-secret/versions/latest
      env: 'COOKIE_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/medusa-jwt-secret/versions/latest
      env: 'JWT_SECRET'

steps:
  # ============================================
  # MEDUSA BACKEND
  # ============================================

  # Step 1: Build Medusa backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-medusa-backend
    args:
      - 'build'
      - '-t'
      - '$_AR_REPO/medusa-backend:$SHORT_SHA'
      - '-t'
      - '$_AR_REPO/medusa-backend:latest'
      - '-f'
      - 'medusa-backend/Dockerfile'
      - 'medusa-backend'

  # Step 2: Push Medusa backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-medusa-backend
    args: ['push', '--all-tags', '$_AR_REPO/medusa-backend']
    waitFor: ['build-medusa-backend']

  # Step 3: Run Medusa DB migrations (main branch only)
  - name: '$_AR_REPO/medusa-backend:$SHORT_SHA'
    id: db-migrate
    entrypoint: npx
    args: ['medusa', 'db:migrate']
    secretEnv: ['DATABASE_URL', 'REDIS_URL', 'COOKIE_SECRET', 'JWT_SECRET']
    waitFor: ['push-medusa-backend']

  # Step 4: Deploy Medusa backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-medusa-backend
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          gcloud run deploy leka-medusa-backend \
            --image $_AR_REPO/medusa-backend:$SHORT_SHA \
            --region $_REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 9000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5 \
            --set-secrets="DATABASE_URL=medusa-database-url:latest,REDIS_URL=medusa-redis-url:latest,COOKIE_SECRET=medusa-cookie-secret:latest,JWT_SECRET=medusa-jwt-secret:latest" \
            --set-env-vars="STORE_CORS=https://catalogs.leka.studio,ADMIN_CORS=https://admin.catalogs.leka.studio,AUTH_CORS=https://catalogs.leka.studio"
          echo "Deployed medusa-backend:$SHORT_SHA"
        else
          echo "Branch $BRANCH_NAME: skipping deploy"
        fi
    waitFor: ['db-migrate']

  # ============================================
  # NEXT.JS STOREFRONT
  # ============================================

  # Step 5: Build storefront image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-storefront
    args:
      - 'build'
      - '-t'
      - '$_AR_REPO/medusa-storefront:$SHORT_SHA'
      - '-t'
      - '$_AR_REPO/medusa-storefront:latest'
      - '-f'
      - 'medusa-storefront/Dockerfile'
      - 'medusa-storefront'
      - '--build-arg'
      - 'NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://leka-medusa-backend-538978391890.$_REGION.run.app'

  # Step 6: Push storefront image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-storefront
    args: ['push', '--all-tags', '$_AR_REPO/medusa-storefront']
    waitFor: ['build-storefront']

  # Step 7: Deploy storefront to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-storefront
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          gcloud run deploy leka-medusa-storefront \
            --image $_AR_REPO/medusa-storefront:$SHORT_SHA \
            --region $_REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5
          echo "Deployed medusa-storefront:$SHORT_SHA"
        else
          echo "Branch $BRANCH_NAME: skipping deploy"
        fi
    waitFor: ['push-storefront']

images:
  - '$_AR_REPO/medusa-backend:$SHORT_SHA'
  - '$_AR_REPO/medusa-backend:latest'
  - '$_AR_REPO/medusa-storefront:$SHORT_SHA'
  - '$_AR_REPO/medusa-storefront:latest'

tags:
  - 'leka-product-catalogs'
  - '$BRANCH_NAME'
  - '$SHORT_SHA'
