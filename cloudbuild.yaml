# cloudbuild.yaml
# Leka Product Catalogs — Backend-Only Cloud Build Pipeline
# Service: medusa-backend (Medusa v2)
#
# Storefront migrated to eukrit/leka-website repo on 2026-05-10
# (catalogs/ + cloudbuild-catalogs.yaml; deploys Cloud Run service
# `leka-catalogs` and serves https://catalogs.leka.studio/).
#
# Triggers: push to main (deploy) | push to dev/* (build+test only)
# Secrets are loaded from GCP Secret Manager.

substitutions:
  _REGION: asia-southeast1
  _AR_REPO: asia-southeast1-docker.pkg.dev/ai-agents-go/leka-product-catalogs

options:
  logging: CLOUD_LOGGING_ONLY
  # E2_HIGHCPU_8 retained from the prior multi-service pipeline. Backend-only
  # builds (Medusa v2 ~19k-line lockfile, `medusa build` TypeScript compile)
  # still benefit from the larger machine vs E2_MEDIUM, which timed out at
  # `npm ci` from 2026-05-05 onward.
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/medusa-database-url/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/medusa-redis-url/versions/latest
      env: 'REDIS_URL'
    - versionName: projects/$PROJECT_ID/secrets/medusa-cookie-secret/versions/latest
      env: 'COOKIE_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/medusa-jwt-secret/versions/latest
      env: 'JWT_SECRET'

steps:
  # ============================================
  # MEDUSA BACKEND
  # ============================================

  # Step 1: Build Medusa backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-medusa-backend
    args:
      - 'build'
      # Bake catalogs.leka.studio into the admin bundle so its API calls
      # land on the same origin as the storefront (Next.js rewrites proxy
      # /app, /admin, /auth → leka-medusa-backend). One origin = no CORS.
      - '--build-arg=MEDUSA_BACKEND_URL=https://catalogs.leka.studio'
      - '-t'
      - '$_AR_REPO/medusa-backend:$SHORT_SHA'
      - '-t'
      - '$_AR_REPO/medusa-backend:latest'
      - '-f'
      - 'medusa-backend/Dockerfile'
      - 'medusa-backend'

  # Step 2: Push Medusa backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-medusa-backend
    args: ['push', '--all-tags', '$_AR_REPO/medusa-backend']
    waitFor: ['build-medusa-backend']

  # Step 3: Run Medusa DB migrations (main branch only).
  # Use `npm run db:migrate` (package.json script) rather than `npx medusa
  # db:migrate` — npx couldn't resolve the `medusa` bin in the production
  # image even though the package.json script does. `npm run` is what the
  # Dockerfile already uses for `npm run build`, so this matches.
  - name: '$_AR_REPO/medusa-backend:$SHORT_SHA'
    id: db-migrate
    # Custom entrypoint overrides the image's WORKDIR; without `cd /app` first,
    # npm runs in /workspace where there's no package.json (v2.8.3 bug — every
    # build since 4e31de5 failed `npm error Missing script: "db:migrate"`).
    entrypoint: bash
    args: ['-c', 'cd /app && npm run db:migrate']
    secretEnv: ['DATABASE_URL', 'REDIS_URL', 'COOKIE_SECRET', 'JWT_SECRET']
    waitFor: ['push-medusa-backend']

  # Step 4: Deploy Medusa backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-medusa-backend
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          gcloud run deploy leka-medusa-backend \
            --image $_AR_REPO/medusa-backend:$SHORT_SHA \
            --region $_REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 9000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5 \
            --set-secrets="DATABASE_URL=medusa-database-url:latest,REDIS_URL=medusa-redis-url:latest,COOKIE_SECRET=medusa-cookie-secret:latest,JWT_SECRET=medusa-jwt-secret:latest,MEDUSA_ADMIN_PASSWORD=medusa-admin-password:latest,GOOGLE_CLIENT_ID=medusa-google-oauth-client-id:latest,GOOGLE_CLIENT_SECRET=medusa-google-oauth-client-secret:latest,GOOGLE_CALLBACK_URL=medusa-google-oauth-callback-url:latest" \
            --set-env-vars="^|^NODE_ENV=production|DISABLE_ADMIN=false|MEDUSA_ADMIN_EMAIL=admin@leka.studio|MEDUSA_BACKEND_URL=https://catalogs.leka.studio|STORE_CORS=https://catalogs.leka.studio|ADMIN_CORS=https://catalogs.leka.studio,https://leka-medusa-backend-538978391890.$_REGION.run.app|AUTH_CORS=https://catalogs.leka.studio,https://leka-medusa-backend-538978391890.$_REGION.run.app|DATA_COMMS_SEND_SLACK_URL=https://data-comms-send-slack-538978391890.$_REGION.run.app|DATA_COMMS_SEND_EMAIL_URL=https://data-comms-send-email-538978391890.$_REGION.run.app|ORDER_NOTIFY_EMAIL=leka-medusa-order@goco.bz|ORDER_NOTIFY_SLACK_CHANNEL=C0B557QQTDK"
          echo "Deployed medusa-backend:$SHORT_SHA"
        else
          echo "Branch $BRANCH_NAME: skipping deploy"
        fi
    waitFor: ['db-migrate']

  # NEXT.JS STOREFRONT — removed 2026-05-10
  # Storefront moved to eukrit/leka-website (catalogs/ + cloudbuild-catalogs.yaml).
  # New Cloud Run service: leka-catalogs. Domain: https://catalogs.leka.studio.
  # Old service `leka-medusa-storefront` cold-scaled (min=0,max=1) for 24h
  # rollback safety; will be deleted once new stack is validated.

images:
  - '$_AR_REPO/medusa-backend:$SHORT_SHA'
  - '$_AR_REPO/medusa-backend:latest'

tags:
  - 'leka-product-catalogs'
  - '$BRANCH_NAME'
  - '$SHORT_SHA'
